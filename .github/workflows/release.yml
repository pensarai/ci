# Release Workflow
# Triggered on pushes to main - publishes to npm when package.json version changes
# Automatically creates a git tag and GitHub release

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger for re-runs

permissions:
  contents: write
  id-token: write # Required for npm OIDC authentication

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout code
        # zizmor: ignore[artipacked] — no artifact uploads in this workflow
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Check if version is already published
        id: check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "package=$PACKAGE_NAME" >> $GITHUB_OUTPUT

          # Check if this version already exists on npm
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME@$LOCAL_VERSION" version 2>/dev/null || echo "")

          if [ "$PUBLISHED_VERSION" = "$LOCAL_VERSION" ]; then
            echo "Version $LOCAL_VERSION is already published — skipping release."
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version $LOCAL_VERSION is not yet published — will release."
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check.outputs.should_publish == 'true'
        run: npm ci

      - name: Build
        if: steps.check.outputs.should_publish == 'true'
        run: npm run build

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create and push git tag
        if: steps.check.outputs.should_publish == 'true'
        env:
          RELEASE_VERSION: ${{ steps.check.outputs.version }}
        run: |
          TAG="v${RELEASE_VERSION}"

          # Check if the tag already exists on the remote
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on remote — skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG" 2>/dev/null || echo "Tag $TAG already exists locally"
            git push origin "$TAG"
          fi

      - name: Generate release notes
        if: steps.check.outputs.should_publish == 'true'
        env:
          RELEASE_VERSION: ${{ steps.check.outputs.version }}
          RELEASE_PACKAGE: ${{ steps.check.outputs.package }}
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to v${RELEASE_VERSION}"
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD --no-merges)
          else
            echo "No previous tag found, listing recent commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" -20 --no-merges)
          fi

          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md
          echo "$COMMITS" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "npm install ${RELEASE_PACKAGE}@${RELEASE_VERSION}" >> release_notes.md
          echo '```' >> release_notes.md

      - name: Create GitHub Release
        if: steps.check.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.check.outputs.version }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${RELEASE_VERSION}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${RELEASE_VERSION}" \
            --title "v${RELEASE_VERSION}" \
            --notes-file release_notes.md \
            $PRERELEASE_FLAG
